<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axis — Пропорция</title>
<style>
body { font-family: Arial, sans-serif; background: #0f0f0f; color: #fff; margin: 0; padding: 20px; }
h1 { color: #4a9eff; }
.cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin: 20px 0; }
.card { background: #1a1a1a; border-radius: 12px; padding: 16px; }
.card-label { font-size: 12px; color: #888; margin-bottom: 8px; }
.card-val { font-size: 24px; font-weight: bold; }
.green { color: #4caf50; }
</style>
</head>
<body>
<h1>Axis</h1>
<p style="color:#888">Сквозная аналитика — Пропорция</p>
<div class="cards">
<div class="card"><div class="card-label">Выручка</div><div class="card-val">847 300 ₽</div><div class="green">+14%</div></div>
<div class="card"><div class="card-label">Заказов</div><div class="card-val">1 243</div><div class="green">+9%</div></div>
<div class="card"><div class="card-label">CAC</div><div class="card-val">312 ₽</div><div class="green">-18 ₽</div></div>
<div class="card"><div class="card-label">ROAS</div><div class="card-val">4.2×</div><div class="green">+0.4</div></div>
</div>
<p style="color:#555; margin-top: 40px;">Axis v1.0 — работает</p>
</body>
</html>
